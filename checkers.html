<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Checkers</title>
<style>
:root {
  --bg: #0d1117;
  --panel: #161b22;
  --border: rgba(255,255,255,.08);
  --text: #e6edf3;
  --muted: #8b949e;
  --shadow: 0 8px 32px rgba(0,0,0,.5);
  --radius: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px 16px 32px;
  gap: 16px;
}
h1 { font-size: 22px; font-weight: 700; letter-spacing: .4px; }
.scoreboard {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 28px;
  width: 100%;
  max-width: 512px;
  box-shadow: var(--shadow);
}
.side { display: flex; flex-direction: column; align-items: center; gap: 3px; }
.side-label {
  font-size: 11px; font-weight: 700;
  letter-spacing: 1px; color: var(--muted); text-transform: uppercase;
}
.side-score {
  font-size: 34px; font-weight: 800;
  font-variant-numeric: tabular-nums; line-height: 1;
}
.red-score  { color: #f85149; }
.dark-score { color: #8b949e; }
.side-sub   { font-size: 11px; color: var(--muted); }
.status-text {
  font-size: 13px; color: var(--muted);
  font-style: italic; text-align: center; min-width: 110px;
}
#canvas {
  border-radius: 10px;
  box-shadow: var(--shadow), 0 0 0 1px rgba(255,255,255,.06);
  cursor: pointer;
  display: block;
  width: min(512px, calc(100vw - 32px));
  height: min(512px, calc(100vw - 32px));
}
.btn-row { display: flex; gap: 10px; }
.btn {
  background: var(--panel);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px 22px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  box-shadow: var(--shadow);
}
.btn:hover  { background: #21262d; }
.btn:active { transform: translateY(1px); }
.hint {
  font-size: 12px; color: var(--muted);
  text-align: center; max-width: 420px; line-height: 1.6;
}
</style>
</head>
<body>

<h1>Checkers</h1>

<div class="scoreboard">
  <div class="side">
    <span class="side-label">You</span>
    <span class="side-score red-score" id="pCaps">0</span>
    <span class="side-sub">captured</span>
  </div>
  <span class="status-text" id="status">Your turn</span>
  <div class="side">
    <span class="side-label">CPU</span>
    <span class="side-score dark-score" id="cCaps">0</span>
    <span class="side-sub">captured</span>
  </div>
</div>

<canvas id="canvas" width="512" height="512"></canvas>

<div class="btn-row">
  <button class="btn" id="newBtn">New Game</button>
</div>

<p class="hint">
  Click a <strong style="color:#f85149">red piece</strong> to select it, then click a highlighted square to move left or right.<br>
  Jumps are mandatory. Reach the far end to become a King ♛.
</p>

<script>
'use strict';

const CELL = 64;
const N    = 8;
const cv   = document.getElementById('canvas');
const ctx  = cv.getContext('2d');
cv.width = cv.height = N * CELL;

// Pieces
const EMPTY = 0, P = 1, PK = 2, C = -1, CK = -2;

// State
let board, sel, hilights, pCaps, cCaps, turn, mjPiece, over;

/* ─── Init ─────────────────────────────────────────────────── */
function newGame() {
  board = Array.from({length: N}, () => new Array(N).fill(EMPTY));
  for (let r = 0; r < 3; r++)
    for (let c = 0; c < N; c++)
      if ((r + c) % 2 === 1) board[r][c] = C;
  for (let r = 5; r < N; r++)
    for (let c = 0; c < N; c++)
      if ((r + c) % 2 === 1) board[r][c] = P;
  sel = null; hilights = []; pCaps = 0; cCaps = 0;
  turn = 'player'; mjPiece = null; over = false;
  setStatus('Your turn');
  updateScore();
  render();
}

/* ─── Helpers ───────────────────────────────────────────────── */
const isP    = p => p === P  || p === PK;
const isC    = p => p === C  || p === CK;
const isKing = p => p === PK || p === CK;
const oob    = (r, c) => r < 0 || r >= N || c < 0 || c >= N;
const isOpp  = (a, b) => (isP(a) && isC(b)) || (isC(a) && isP(b));

function dirs(piece) {
  if (isKing(piece)) return [[-1,-1],[-1,1],[1,-1],[1,1]];
  return isP(piece) ? [[-1,-1],[-1,1]] : [[1,-1],[1,1]];
}

/* ─── Move generation ───────────────────────────────────────── */
function rawMoves(r, c, b) {
  const p = b[r][c];
  const moves = [], jumps = [];
  for (const [dr, dc] of dirs(p)) {
    const nr = r+dr, nc = c+dc;
    if (oob(nr, nc)) continue;
    if (b[nr][nc] === EMPTY) {
      moves.push({r: nr, c: nc, cap: null});
    } else if (isOpp(p, b[nr][nc])) {
      const jr = r+2*dr, jc = c+2*dc;
      if (!oob(jr, jc) && b[jr][jc] === EMPTY)
        jumps.push({r: jr, c: jc, cap: {r: nr, c: nc}});
    }
  }
  return {moves, jumps};
}

function sideHasJump(forPlayer, b) {
  for (let r = 0; r < N; r++)
    for (let c = 0; c < N; c++) {
      if (forPlayer  && !isP(b[r][c])) continue;
      if (!forPlayer && !isC(b[r][c])) continue;
      if (rawMoves(r, c, b).jumps.length > 0) return true;
    }
  return false;
}

function validFor(r, c, b) {
  const {moves, jumps} = rawMoves(r, c, b);
  if (sideHasJump(isP(b[r][c]), b)) return jumps;
  return moves;
}

/* ─── Apply move ────────────────────────────────────────────── */
function applyMove(b, fr, fc, tr, tc, cap) {
  const nb = b.map(row => [...row]);
  const piece = nb[fr][fc];
  nb[tr][tc] = piece;
  nb[fr][fc] = EMPTY;
  if (cap) nb[cap.r][cap.c] = EMPTY;
  if (piece === P  && tr === 0)   nb[tr][tc] = PK;
  if (piece === C  && tr === N-1) nb[tr][tc] = CK;
  return nb;
}

/* ─── Win detection ─────────────────────────────────────────── */
function anyMove(forPlayer, b) {
  for (let r = 0; r < N; r++)
    for (let c = 0; c < N; c++) {
      if (forPlayer  && !isP(b[r][c])) continue;
      if (!forPlayer && !isC(b[r][c])) continue;
      const {moves, jumps} = rawMoves(r, c, b);
      if (moves.length || jumps.length) return true;
    }
  return false;
}

function pieceCount(b) {
  let p = 0, c = 0;
  for (let r = 0; r < N; r++)
    for (let cc = 0; cc < N; cc++) {
      if (isP(b[r][cc])) p++;
      if (isC(b[r][cc])) c++;
    }
  return {p, c};
}

function checkWin(b) {
  const {p, c} = pieceCount(b);
  if (c === 0 || !anyMove(false, b)) return 'player';
  if (p === 0 || !anyMove(true,  b)) return 'cpu';
  return null;
}

/* ─── Player input ──────────────────────────────────────────── */
cv.addEventListener('click', e => {
  if (over || turn !== 'player') return;
  const rect = cv.getBoundingClientRect();
  const sx = cv.width  / rect.width;
  const sy = cv.height / rect.height;
  const col = Math.floor((e.clientX - rect.left) * sx / CELL);
  const row = Math.floor((e.clientY - rect.top)  * sy / CELL);
  if (oob(row, col)) return;

  // Mid-multijump: only accept highlighted destinations
  if (mjPiece) {
    const mv = hilights.find(h => h.r === row && h.c === col);
    if (mv) doPlayerStep(mjPiece.r, mjPiece.c, mv);
    return;
  }

  // Clicking a highlighted destination
  if (sel) {
    const mv = hilights.find(h => h.r === row && h.c === col);
    if (mv) { doPlayerStep(sel.r, sel.c, mv); return; }
  }

  // Select a player piece
  if (isP(board[row][col])) {
    const moves = validFor(row, col, board);
    if (moves.length) {
      sel = {r: row, c: col};
      hilights = moves;
    } else {
      sel = null; hilights = [];
    }
    render();
  } else {
    sel = null; hilights = [];
    render();
  }
});

function doPlayerStep(fr, fc, mv) {
  const prevPiece = board[fr][fc];
  const wasJump   = !!mv.cap;
  board = applyMove(board, fr, fc, mv.r, mv.c, mv.cap);
  if (wasJump) { pCaps++; updateScore(); }

  const becameKing = prevPiece === P && board[mv.r][mv.c] === PK;

  // Multi-jump continuation
  if (wasJump && !becameKing) {
    const nextJ = rawMoves(mv.r, mv.c, board).jumps;
    if (nextJ.length) {
      sel = {r: mv.r, c: mv.c};
      hilights = nextJ;
      mjPiece = {r: mv.r, c: mv.c};
      render();
      return;
    }
  }

  sel = null; hilights = []; mjPiece = null;
  const w = checkWin(board);
  if (w) { render(); endGame(w); return; }

  turn = 'cpu';
  setStatus('CPU thinking…');
  render();
  setTimeout(doCpu, 520);
}

/* ─── CPU AI (greedy) ───────────────────────────────────────── */
function cpuCandidates(b, forced) {
  const simple = [], jumps = [];
  for (let r = 0; r < N; r++)
    for (let c = 0; c < N; c++) {
      if (!isC(b[r][c])) continue;
      if (forced && (r !== forced.r || c !== forced.c)) continue;
      const {moves, jumps: jj} = rawMoves(r, c, b);
      for (const m of jj)    jumps.push({fr:r, fc:c, tr:m.r, tc:m.c, cap:m.cap});
      for (const m of moves)  simple.push({fr:r, fc:c, tr:m.r, tc:m.c, cap:null});
    }
  return jumps.length ? jumps : simple;
}

function scoreMove(mv, b) {
  let s = 0;
  if (mv.cap) s += 10;
  if (b[mv.fr][mv.fc] === C && mv.tr === N-1) s += 6;   // kinging bonus
  s += mv.tr * 0.3;                                       // prefer advancing
  if (mv.tc === 0 || mv.tc === N-1) s += 0.4;            // edge safety
  s += Math.random() * 0.5;                               // slight randomness
  return s;
}

function doCpu(forced) {
  if (over) return;
  const moves = cpuCandidates(board, forced);
  if (!moves.length) { endGame('player'); return; }

  let best = null, bestS = -Infinity;
  for (const mv of moves) {
    const s = scoreMove(mv, board);
    if (s > bestS) { bestS = s; best = mv; }
  }

  const prevPiece = board[best.fr][best.fc];
  const wasJump   = !!best.cap;
  board = applyMove(board, best.fr, best.fc, best.tr, best.tc, best.cap);
  if (wasJump) { cCaps++; updateScore(); }

  const w = checkWin(board);
  if (w) { render(); endGame(w); return; }

  const becameKing = prevPiece === C && board[best.tr][best.tc] === CK;
  if (wasJump && !becameKing) {
    const nextJ = rawMoves(best.tr, best.tc, board).jumps;
    if (nextJ.length) {
      render();
      setTimeout(() => doCpu({r: best.tr, c: best.tc}), 380);
      return;
    }
  }

  turn = 'player';
  setStatus('Your turn');
  render();
  if (!anyMove(true, board)) endGame('cpu');
}

/* ─── UI helpers ────────────────────────────────────────────── */
function endGame(winner) {
  over = true;
  setStatus(winner === 'player' ? '🎉 You win!' : '🤖 CPU wins!');
  render();
}

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

function updateScore() {
  document.getElementById('pCaps').textContent = pCaps;
  document.getElementById('cCaps').textContent = cCaps;
}

/* ─── Rendering ─────────────────────────────────────────────── */
function render() {
  ctx.clearRect(0, 0, cv.width, cv.height);

  // Board squares
  for (let r = 0; r < N; r++)
    for (let c = 0; c < N; c++) {
      ctx.fillStyle = (r + c) % 2 === 0 ? '#f0d9b5' : '#b58863';
      ctx.fillRect(c * CELL, r * CELL, CELL, CELL);
    }

  // Move highlights
  for (const h of hilights) {
    ctx.fillStyle = 'rgba(255, 220, 0, .44)';
    ctx.fillRect(h.c * CELL, h.r * CELL, CELL, CELL);
    ctx.beginPath();
    ctx.arc(h.c*CELL + CELL/2, h.r*CELL + CELL/2, 11, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255, 200, 0, .85)';
    ctx.fill();
  }

  // Selected square ring
  if (sel) {
    ctx.strokeStyle = 'rgba(255,255,80,.75)';
    ctx.lineWidth = 3;
    ctx.strokeRect(sel.c*CELL + 2, sel.r*CELL + 2, CELL-4, CELL-4);
  }

  // Pieces
  for (let r = 0; r < N; r++)
    for (let c = 0; c < N; c++)
      if (board[r][c] !== EMPTY) drawPiece(r, c, board[r][c]);

  // Game-over dim
  if (over) {
    ctx.fillStyle = 'rgba(0,0,0,.55)';
    ctx.fillRect(0, 0, cv.width, cv.height);
  }
}

function drawPiece(r, c, piece) {
  const x = c*CELL + CELL/2;
  const y = r*CELL + CELL/2;
  const rad = CELL/2 - 6;

  // Drop shadow
  ctx.beginPath();
  ctx.arc(x + 1.5, y + 3, rad, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(0,0,0,.38)';
  ctx.fill();

  // Piece fill (radial gradient)
  const red = isP(piece);
  const g = ctx.createRadialGradient(x - rad*.28, y - rad*.3, rad*.06, x, y, rad);
  if (red) {
    g.addColorStop(0, '#ff6b6b');
    g.addColorStop(1, '#b71c1c');
  } else {
    g.addColorStop(0, '#546e7a');
    g.addColorStop(1, '#102027');
  }
  ctx.beginPath();
  ctx.arc(x, y, rad, 0, Math.PI*2);
  ctx.fillStyle = g;
  ctx.fill();

  // Rim
  ctx.beginPath();
  ctx.arc(x, y, rad, 0, Math.PI*2);
  ctx.strokeStyle = red ? '#7f0000' : '#000a12';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Inner highlight ring
  ctx.beginPath();
  ctx.arc(x, y, rad - 5, 0, Math.PI*2);
  ctx.strokeStyle = red ? 'rgba(255,160,160,.22)' : 'rgba(255,255,255,.07)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // King crown
  if (isKing(piece)) {
    ctx.font = `bold ${Math.round(CELL * .36)}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(0,0,0,.8)';
    ctx.shadowBlur = 4;
    ctx.fillStyle = '#ffd700';
    ctx.fillText('♛', x, y + 1);
    ctx.shadowBlur = 0;
  }
}

document.getElementById('newBtn').addEventListener('click', newGame);
newGame();
</script>
</body>
</html>
