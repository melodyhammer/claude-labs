<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Checkers v2 — Gesture Control</title>
<style>
:root {
  --bg: #0d1117;
  --panel: #161b22;
  --border: rgba(255,255,255,.08);
  --text: #e6edf3;
  --muted: #8b949e;
  --shadow: 0 8px 32px rgba(0,0,0,.5);
  --radius: 16px;
  --amber: #f59e0b;
  --green: #22c55e;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; padding: 20px 16px 32px; gap: 12px;
}
h1 { font-size: 21px; font-weight: 700; letter-spacing: .4px; }

.scoreboard {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--panel); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px 28px;
  width: 100%; max-width: 512px; box-shadow: var(--shadow);
}
.side { display: flex; flex-direction: column; align-items: center; gap: 3px; }
.side-label { font-size: 11px; font-weight: 700; letter-spacing: 1px; color: var(--muted); text-transform: uppercase; }
.side-score { font-size: 32px; font-weight: 800; font-variant-numeric: tabular-nums; line-height: 1; }
.red-score  { color: #f85149; }
.dark-score { color: #8b949e; }
.side-sub   { font-size: 11px; color: var(--muted); }
.status-text { font-size: 13px; color: var(--muted); font-style: italic; text-align: center; min-width: 110px; }

/* ── sensor panel ── */
.sensor-panel {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 16px 12px;
  width: 100%; max-width: 512px; box-shadow: var(--shadow);
  display: flex; flex-direction: column; gap: 10px;
}
.sensor-row { display: flex; align-items: center; gap: 9px; flex-wrap: wrap; }
.sensor-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: #3f3f46; flex: none; transition: background .2s;
}
.sensor-dot.connected { background: var(--green);  box-shadow: 0 0 6px #22c55e88; }
.sensor-dot.pinching  { background: var(--amber);  box-shadow: 0 0 8px #f59e0b99; }
.sensor-dot.selecting { background: var(--green);  box-shadow: 0 0 10px #22c55eaa; }
.sensor-lbl { font-size: 12px; color: var(--muted); white-space: nowrap; }
.sensor-num { font-family: ui-monospace, monospace; font-size: 13px; color: var(--text); min-width: 54px; }
.sensor-st  { font-family: ui-monospace, monospace; font-size: 12px; color: var(--muted); min-width: 64px; }
.pkt-count  { font-family: ui-monospace, monospace; font-size: 11px; color: #3d5066; margin-left: auto; }

.bar-wrap {
  flex: 1; min-width: 80px; position: relative; height: 16px;
  background: rgba(255,255,255,.04); border-radius: 999px;
  border: 1px solid rgba(255,255,255,.08); overflow: visible;
}
.bar-fill {
  height: 100%; width: 0%; border-radius: 999px;
  background: linear-gradient(90deg, #3b82f6, #8b5cf6);
  transition: width .07s linear; position: relative; z-index: 1;
  overflow: hidden;
}
.bar-marker {
  position: absolute; top: -3px; bottom: -3px; width: 2px;
  border-radius: 1px; z-index: 2;
}
.marker-pinch  { background: var(--amber); }
.marker-select { background: var(--green); }

.thresh-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.thresh-group { display: flex; flex-direction: column; gap: 4px; }
.thresh-lbl { font-size: 11px; font-weight: 700; letter-spacing: .4px; text-transform: uppercase; }
.thresh-lbl.pinch  { color: var(--amber); }
.thresh-lbl.select { color: var(--green); }
.thresh-ctrl { display: flex; align-items: center; gap: 7px; }
input[type=range] { flex: 1; }
input[type=range].pinch-range  { accent-color: var(--amber); }
input[type=range].select-range { accent-color: var(--green); }
.thresh-num { font-family: ui-monospace, monospace; font-size: 12px; color: var(--muted); min-width: 34px; text-align: right; }
.btn-cal {
  font-size: 11px; padding: 4px 9px; border-radius: 7px;
  border: 1px solid rgba(255,255,255,.10); background: rgba(255,255,255,.04);
  color: var(--muted); cursor: pointer; white-space: nowrap;
}
.btn-cal:hover { background: rgba(255,255,255,.09); color: var(--text); }

.guide-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.chip {
  display: flex; align-items: center; gap: 6px;
  border: 1px solid rgba(255,255,255,.07); background: rgba(255,255,255,.03);
  border-radius: 999px; padding: 5px 10px; font-size: 11px; color: var(--muted);
}
.chip-dot { width: 8px; height: 8px; border-radius: 50%; flex: none; }
.scan-hint { font-size: 12px; color: #4a6a8a; font-style: italic; }
.raw-line { font-family: ui-monospace, monospace; font-size: 11px; color: #2d4a60; min-height: 13px; }

/* ── canvas ── */
#canvas {
  border-radius: 10px;
  box-shadow: var(--shadow), 0 0 0 1px rgba(255,255,255,.06);
  cursor: pointer; display: block;
  width: min(512px, calc(100vw - 32px));
  height: min(512px, calc(100vw - 32px));
}
.btn-row { display: flex; gap: 10px; }
.btn {
  background: var(--panel); border: 1px solid var(--border);
  color: var(--text); padding: 10px 22px; border-radius: 10px;
  cursor: pointer; font-size: 14px; font-weight: 600; box-shadow: var(--shadow);
}
.btn:hover  { background: #21262d; }
.btn:active { transform: translateY(1px); }
.btn-sm { padding: 7px 14px; font-size: 12px; }
.kbd { font-family: ui-monospace, monospace; font-size: 11px; color: var(--muted); }
</style>
</head>
<body>

<h1>Checkers — Gesture Control</h1>

<div class="scoreboard">
  <div class="side">
    <span class="side-label">You</span>
    <span class="side-score red-score" id="pCaps">0</span>
    <span class="side-sub">captured</span>
  </div>
  <span class="status-text" id="status">Your turn</span>
  <div class="side">
    <span class="side-label">CPU</span>
    <span class="side-score dark-score" id="cCaps">0</span>
    <span class="side-sub">captured</span>
  </div>
</div>

<div class="sensor-panel">

  <!-- row 1: live signal -->
  <div class="sensor-row">
    <div class="sensor-dot" id="sensorDot"></div>
    <span class="sensor-lbl" id="sensorLbl">Not connected</span>
    <div class="bar-wrap" id="barWrap">
      <div class="bar-fill"   id="barFill"></div>
      <div class="bar-marker marker-pinch"  id="mPinch"></div>
      <div class="bar-marker marker-select" id="mSelect"></div>
    </div>
    <span class="sensor-num" id="sensorNum">–</span>
    <span class="sensor-st"  id="sensorSt">State: –</span>
    <span class="pkt-count"  id="pktCount"></span>
    <button class="btn btn-sm" id="connectBtn">Connect</button>
  </div>

  <!-- row 2: raw line (confirms parsing works) -->
  <div class="raw-line" id="rawLine">connect sensor to see live data</div>

  <!-- row 3: thresholds -->
  <div class="thresh-row">
    <div class="thresh-group">
      <span class="thresh-lbl pinch">Pinch — cycle</span>
      <div class="thresh-ctrl">
        <input type="range" class="pinch-range" id="pinchSlider" min="10" max="800" value="50">
        <span class="thresh-num" id="pinchNum">50</span>
        <button class="btn-cal" id="calPinch">Set live</button>
      </div>
    </div>
    <div class="thresh-group">
      <span class="thresh-lbl select">Extend — confirm</span>
      <div class="thresh-ctrl">
        <input type="range" class="select-range" id="selectSlider" min="30" max="1000" value="300">
        <span class="thresh-num" id="selectNum">300</span>
        <button class="btn-cal" id="calSelect">Set live</button>
      </div>
    </div>
  </div>

  <!-- row 4: legend + scan hint -->
  <div class="guide-row">
    <div class="chip"><span class="chip-dot" style="background:var(--amber)"></span>Pinch → cycle</div>
    <div class="chip"><span class="chip-dot" style="background:var(--green)"></span>Extend → confirm</div>
    <div class="chip"><span class="chip-dot" style="background:#8b5cf6"></span><span class="kbd">Space</span> cycle &nbsp;|&nbsp; <span class="kbd">Enter</span> confirm</div>
    <span class="scan-hint" id="scanHint"></span>
  </div>

</div>

<canvas id="canvas" width="512" height="512"></canvas>

<div class="btn-row">
  <button class="btn" id="newBtn">New Game</button>
</div>

<script>
'use strict';

/* ═══════════════ BOARD SETUP ═══════════════ */
const CELL = 64, N = 8;
const cv  = document.getElementById('canvas');
const ctx = cv.getContext('2d');
cv.width = cv.height = N * CELL;

const EMPTY = 0, P = 1, PK = 2, C = -1, CK = -2;

let board, sel, hilights, pCaps, cCaps, turn, mjPiece, over;

/* ═══════════════ SENSOR STATE ═══════════════ */
let serialConnected = false;
let liveValue       = 0;
let pinchThresh     = 50;
let selectThresh    = 300;
let currentZone     = 'rest';   // 'rest' | 'pinch' | 'select'
let lastPinch       = 0;
let lastSelect      = 0;
let pktCount        = 0;
const COOLDOWN      = 650;

/* ═══════════════ SCAN STATE ═══════════════ */
let scanPhase  = null;   // 'pieces' | 'moves'
let scanItems  = [];
let scanIndex  = 0;
let activeScan = null;

/* ─────────────── INIT ─────────────────── */
function newGame() {
  board = Array.from({length: N}, () => new Array(N).fill(EMPTY));
  for (let r = 0; r < 3; r++)
    for (let c = 0; c < N; c++) if ((r+c)%2===1) board[r][c] = C;
  for (let r = 5; r < N; r++)
    for (let c = 0; c < N; c++) if ((r+c)%2===1) board[r][c] = P;
  sel = null; hilights = []; pCaps = 0; cCaps = 0;
  turn = 'player'; mjPiece = null; over = false;
  clearScan();
  setStatus('Your turn');
  updateScore();
  if (serialConnected) initPieceScan();
  render();
}

/* ─────────────── PIECE / MOVE HELPERS ─── */
const isP    = p => p===P  || p===PK;
const isC    = p => p===C  || p===CK;
const isKing = p => p===PK || p===CK;
const oob    = (r,c) => r<0||r>=N||c<0||c>=N;
const isOpp  = (a,b) => (isP(a)&&isC(b))||(isC(a)&&isP(b));

function dirs(piece) {
  if (isKing(piece)) return [[-1,-1],[-1,1],[1,-1],[1,1]];
  return isP(piece) ? [[-1,-1],[-1,1]] : [[1,-1],[1,1]];
}

function rawMoves(r, c, b) {
  const p=b[r][c], moves=[], jumps=[];
  for (const [dr,dc] of dirs(p)) {
    const nr=r+dr, nc=c+dc;
    if (oob(nr,nc)) continue;
    if (b[nr][nc]===EMPTY) {
      moves.push({r:nr,c:nc,cap:null});
    } else if (isOpp(p,b[nr][nc])) {
      const jr=r+2*dr, jc=c+2*dc;
      if (!oob(jr,jc)&&b[jr][jc]===EMPTY)
        jumps.push({r:jr,c:jc,cap:{r:nr,c:nc}});
    }
  }
  return {moves,jumps};
}

function sideHasJump(forP, b) {
  for (let r=0;r<N;r++) for (let c=0;c<N;c++) {
    if (forP && !isP(b[r][c])) continue;
    if (!forP && !isC(b[r][c])) continue;
    if (rawMoves(r,c,b).jumps.length>0) return true;
  }
  return false;
}

function validFor(r, c, b) {
  const {moves,jumps} = rawMoves(r,c,b);
  if (sideHasJump(isP(b[r][c]),b)) return jumps;
  return moves;
}

function applyMove(b, fr, fc, tr, tc, cap) {
  const nb = b.map(row=>[...row]);
  const piece = nb[fr][fc];
  nb[tr][tc]=piece; nb[fr][fc]=EMPTY;
  if (cap) nb[cap.r][cap.c]=EMPTY;
  if (piece===P  && tr===0)   nb[tr][tc]=PK;
  if (piece===C  && tr===N-1) nb[tr][tc]=CK;
  return nb;
}

function anyMove(forP, b) {
  for (let r=0;r<N;r++) for (let c=0;c<N;c++) {
    if (forP && !isP(b[r][c])) continue;
    if (!forP && !isC(b[r][c])) continue;
    const {moves,jumps}=rawMoves(r,c,b);
    if (moves.length||jumps.length) return true;
  }
  return false;
}

function pieceCount(b) {
  let p=0,c=0;
  for (let r=0;r<N;r++) for (let cc=0;cc<N;cc++) { if(isP(b[r][cc]))p++; if(isC(b[r][cc]))c++; }
  return {p,c};
}

function checkWin(b) {
  const {p,c}=pieceCount(b);
  if (c===0||!anyMove(false,b)) return 'player';
  if (p===0||!anyMove(true,b))  return 'cpu';
  return null;
}

/* ═══════════════ SCAN ═══════════════════ */
function clearScan() {
  scanPhase=null; scanItems=[]; scanIndex=0; activeScan=null;
}

function initPieceScan() {
  if (over || turn!=='player') return;
  clearScan();
  const pieces=[];
  for (let r=0;r<N;r++) for (let c=0;c<N;c++)
    if (isP(board[r][c]) && validFor(r,c,board).length>0) pieces.push({r,c});
  if (!pieces.length) return;
  scanPhase='pieces'; scanItems=pieces; scanIndex=0; activeScan=pieces[0];
  sel=activeScan; hilights=validFor(activeScan.r,activeScan.c,board);
  setScanHint(`Piece 1/${pieces.length} — pinch to cycle, extend to confirm`);
  render();
}

function initMoveScan(pr, pc) {
  clearScan();
  const moves=validFor(pr,pc,board);
  if (!moves.length) return;
  sel={r:pr,c:pc}; hilights=moves;
  scanPhase='moves'; scanItems=moves; scanIndex=0; activeScan=moves[0];
  setScanHint(`Move 1/${moves.length} — pinch to cycle, extend to confirm`);
  render();
}

function initJumpScan(pr, pc, jumps) {
  clearScan();
  sel={r:pr,c:pc}; hilights=jumps;
  scanPhase='moves'; scanItems=jumps; scanIndex=0; activeScan=jumps[0];
  setScanHint(`Jump 1/${jumps.length} — pinch to cycle, extend to confirm`);
  render();
}

/* ═══════════════ GESTURES ═══════════════ */
function onPinch() {
  if (over || turn!=='player' || !scanPhase) return;
  const now=Date.now();
  if (now-lastPinch < COOLDOWN) return;
  lastPinch=now;

  scanIndex=(scanIndex+1)%scanItems.length;
  activeScan=scanItems[scanIndex];

  if (scanPhase==='pieces') {
    sel=activeScan;
    hilights=validFor(activeScan.r,activeScan.c,board);
    setScanHint(`Piece ${scanIndex+1}/${scanItems.length} — pinch to cycle, extend to confirm`);
  } else {
    setScanHint(`Move ${scanIndex+1}/${scanItems.length} — pinch to cycle, extend to confirm`);
  }
  render();
}

function onSelect() {
  if (over || turn!=='player' || !scanPhase) return;
  const now=Date.now();
  if (now-lastSelect < COOLDOWN) return;
  lastSelect=now;

  if (scanPhase==='pieces') {
    initMoveScan(activeScan.r, activeScan.c);
  } else {
    const mv=activeScan;
    clearScan();
    if (mjPiece) doPlayerStep(mjPiece.r,mjPiece.c,mv);
    else         doPlayerStep(sel.r,sel.c,mv);
  }
}

/* ═══════════════ KEYBOARD FALLBACK ══════ */
document.addEventListener('keydown', e => {
  if (e.code==='Space')  { e.preventDefault(); onPinch();  }
  if (e.code==='Enter')  { e.preventDefault(); onSelect(); }
});

/* ═══════════════ MOUSE ══════════════════ */
cv.addEventListener('click', e => {
  if (over||turn!=='player') return;
  const rect=cv.getBoundingClientRect();
  const sx=cv.width/rect.width, sy=cv.height/rect.height;
  const col=Math.floor((e.clientX-rect.left)*sx/CELL);
  const row=Math.floor((e.clientY-rect.top)*sy/CELL);
  if (oob(row,col)) return;

  if (mjPiece) {
    const mv=hilights.find(h=>h.r===row&&h.c===col);
    if (mv) { clearScan(); doPlayerStep(mjPiece.r,mjPiece.c,mv); }
    return;
  }
  if (sel) {
    const mv=hilights.find(h=>h.r===row&&h.c===col);
    if (mv) { clearScan(); doPlayerStep(sel.r,sel.c,mv); return; }
  }
  if (isP(board[row][col])) {
    const moves=validFor(row,col,board);
    if (moves.length) {
      clearScan();
      sel={r:row,c:col}; hilights=moves;
      if (serialConnected) initMoveScan(row,col);
      else render();
    } else { sel=null; hilights=[]; render(); }
  } else { sel=null; hilights=[]; render(); }
});

/* ═══════════════ PLAYER STEP ═══════════ */
function doPlayerStep(fr, fc, mv) {
  const prev=board[fr][fc], wasJump=!!mv.cap;
  board=applyMove(board,fr,fc,mv.r,mv.c,mv.cap);
  if (wasJump) { pCaps++; updateScore(); }

  const becameKing=prev===P&&board[mv.r][mv.c]===PK;
  if (wasJump&&!becameKing) {
    const nj=rawMoves(mv.r,mv.c,board).jumps;
    if (nj.length) {
      sel={r:mv.r,c:mv.c}; hilights=nj; mjPiece={r:mv.r,c:mv.c};
      if (serialConnected) initJumpScan(mv.r,mv.c,nj);
      else render();
      return;
    }
  }

  sel=null; hilights=[]; mjPiece=null; clearScan(); setScanHint('');
  const w=checkWin(board);
  if (w) { render(); endGame(w); return; }
  turn='cpu'; setStatus('CPU thinking…'); render();
  setTimeout(doCpu, 520);
}

/* ═══════════════ CPU ════════════════════ */
function cpuCandidates(b, forced) {
  const simple=[],jumps=[];
  for (let r=0;r<N;r++) for (let c=0;c<N;c++) {
    if (!isC(b[r][c])) continue;
    if (forced&&(r!==forced.r||c!==forced.c)) continue;
    const {moves,jumps:jj}=rawMoves(r,c,b);
    for (const m of jj)    jumps.push({fr:r,fc:c,tr:m.r,tc:m.c,cap:m.cap});
    for (const m of moves)  simple.push({fr:r,fc:c,tr:m.r,tc:m.c,cap:null});
  }
  return jumps.length?jumps:simple;
}

function scoreCpu(mv,b) {
  let s=0;
  if (mv.cap) s+=10;
  if (b[mv.fr][mv.fc]===C&&mv.tr===N-1) s+=6;
  s+=mv.tr*0.3;
  if (mv.tc===0||mv.tc===N-1) s+=0.4;
  s+=Math.random()*0.5;
  return s;
}

function doCpu(forced) {
  if (over) return;
  const moves=cpuCandidates(board,forced);
  if (!moves.length) { endGame('player'); return; }
  let best=null,bs=-Infinity;
  for (const mv of moves) { const s=scoreCpu(mv,board); if(s>bs){bs=s;best=mv;} }
  const prev=board[best.fr][best.fc], wasJump=!!best.cap;
  board=applyMove(board,best.fr,best.fc,best.tr,best.tc,best.cap);
  if (wasJump) { cCaps++; updateScore(); }
  const w=checkWin(board);
  if (w) { render(); endGame(w); return; }
  const becameKing=prev===C&&board[best.tr][best.tc]===CK;
  if (wasJump&&!becameKing) {
    const nj=rawMoves(best.tr,best.tc,board).jumps;
    if (nj.length) { render(); setTimeout(()=>doCpu({r:best.tr,c:best.tc}),380); return; }
  }
  turn='player'; setStatus('Your turn'); render();
  if (!anyMove(true,board)) { endGame('cpu'); return; }
  if (serialConnected) initPieceScan();
}

/* ═══════════════ WEB SERIAL ════════════ */
document.getElementById('connectBtn').addEventListener('click', async () => {
  if (!('serial' in navigator)) {
    alert('Web Serial only works in Chrome or Edge.');
    return;
  }
  try {
    const port = await navigator.serial.requestPort();
    await port.open({ baudRate: 9600 });

    serialConnected = true;
    document.getElementById('sensorDot').classList.add('connected');
    document.getElementById('sensorLbl').textContent = 'MyoWare connected';
    document.getElementById('connectBtn').textContent = 'Connected ✓';
    document.getElementById('connectBtn').disabled    = true;

    const reader  = port.readable.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    (async () => {
      try {
        while (true) {
          const {value, done} = await reader.read();
          if (done) break;
          buf += decoder.decode(value, {stream: true});
          const lines = buf.split('\n');
          buf = lines.pop();
          for (const line of lines) parseSerial(line.trim());
        }
      } catch(e) {
        console.warn('Serial closed:', e);
      } finally {
        reader.releaseLock();
      }
    })();

    if (turn==='player' && !over) initPieceScan();

  } catch(err) {
    if (err.name !== 'NotFoundError') alert('Port error: ' + err.message);
  }
});

function parseSerial(line) {
  if (!line) return;
  const vm = line.match(/Value:\s*(\d+)/);
  const sm = line.match(/State:\s*(\w+)/);
  if (!vm || !sm) return;

  const value = parseInt(vm[1]);
  const state = sm[1];
  liveValue = value;
  pktCount++;

  // Raw line + packet counter
  document.getElementById('rawLine').textContent    = '↳ ' + line;
  document.getElementById('pktCount').textContent   = `${pktCount} pkt`;

  // Bar
  const pct = Math.min(value / 10.23, 100);
  document.getElementById('barFill').style.width    = pct + '%';
  document.getElementById('sensorNum').textContent  = value;
  document.getElementById('sensorSt').textContent   = 'State: ' + state;

  // Zone (rising-edge detection)
  const dot = document.getElementById('sensorDot');
  let zone = 'rest';
  if      (value >= selectThresh) zone = 'select';
  else if (value >= pinchThresh)  zone = 'pinch';

  if (zone !== currentZone) {
    dot.classList.remove('pinching','selecting');
    if      (zone==='pinch')  { dot.classList.add('pinching');  onPinch();  }
    else if (zone==='select') { dot.classList.add('selecting'); onSelect(); }
    currentZone = zone;
  }
}

/* ═══════════════ THRESHOLD CONTROLS ════ */
function positionMarkers() {
  document.getElementById('mPinch').style.left  = Math.min(pinchThresh  / 10.23, 99) + '%';
  document.getElementById('mSelect').style.left = Math.min(selectThresh / 10.23, 99) + '%';
}

document.getElementById('pinchSlider').addEventListener('input', function() {
  pinchThresh = +this.value;
  document.getElementById('pinchNum').textContent = pinchThresh;
  positionMarkers();
});
document.getElementById('selectSlider').addEventListener('input', function() {
  selectThresh = +this.value;
  document.getElementById('selectNum').textContent = selectThresh;
  positionMarkers();
});

document.getElementById('calPinch').addEventListener('click', () => {
  const v = Math.max(10, Math.round(liveValue * 0.75));
  pinchThresh = v;
  document.getElementById('pinchSlider').value = v;
  document.getElementById('pinchNum').textContent = v;
  positionMarkers();
});
document.getElementById('calSelect').addEventListener('click', () => {
  const v = Math.max(pinchThresh + 20, Math.round(liveValue * 0.80));
  selectThresh = v;
  document.getElementById('selectSlider').value = v;
  document.getElementById('selectNum').textContent = v;
  positionMarkers();
});

window.addEventListener('load',   positionMarkers);
window.addEventListener('resize', positionMarkers);

/* ═══════════════ UI HELPERS ═════════════ */
function endGame(winner) {
  over=true; clearScan(); setScanHint('');
  setStatus(winner==='player'?'🎉 You win!':'🤖 CPU wins!');
  render();
}
function setStatus(m)  { document.getElementById('status').textContent  = m; }
function setScanHint(m){ document.getElementById('scanHint').textContent = m; }
function updateScore() {
  document.getElementById('pCaps').textContent = pCaps;
  document.getElementById('cCaps').textContent = cCaps;
}

/* ═══════════════ RENDER ═════════════════ */
function render() {
  ctx.clearRect(0,0,cv.width,cv.height);

  for (let r=0;r<N;r++) for (let c=0;c<N;c++) {
    ctx.fillStyle=(r+c)%2===0?'#f0d9b5':'#b58863';
    ctx.fillRect(c*CELL,r*CELL,CELL,CELL);
  }

  for (const h of hilights) {
    const active = activeScan && scanPhase==='moves' && h.r===activeScan.r && h.c===activeScan.c;
    ctx.fillStyle = active?'rgba(34,197,94,.40)':'rgba(255,220,0,.34)';
    ctx.fillRect(h.c*CELL,h.r*CELL,CELL,CELL);
    ctx.beginPath();
    ctx.arc(h.c*CELL+CELL/2, h.r*CELL+CELL/2, active?15:10, 0, Math.PI*2);
    ctx.fillStyle = active?'rgba(34,220,100,.92)':'rgba(255,200,0,.82)';
    ctx.fill();
  }

  if (sel) {
    ctx.strokeStyle='rgba(255,255,80,.7)';
    ctx.lineWidth=3;
    ctx.strokeRect(sel.c*CELL+2,sel.r*CELL+2,CELL-4,CELL-4);
  }

  for (let r=0;r<N;r++) for (let c=0;c<N;c++)
    if (board[r][c]!==EMPTY) drawPiece(r,c,board[r][c]);

  if (activeScan && scanPhase==='pieces') {
    const x=activeScan.c*CELL+CELL/2, y=activeScan.r*CELL+CELL/2;
    ctx.beginPath(); ctx.arc(x,y,CELL/2-2,0,Math.PI*2);
    ctx.strokeStyle='rgba(34,220,100,.95)'; ctx.lineWidth=3.5; ctx.stroke();
    ctx.beginPath(); ctx.arc(x,y,CELL/2+1,0,Math.PI*2);
    ctx.strokeStyle='rgba(34,220,100,.20)'; ctx.lineWidth=7; ctx.stroke();
  }

  if (over) { ctx.fillStyle='rgba(0,0,0,.55)'; ctx.fillRect(0,0,cv.width,cv.height); }
}

function drawPiece(r,c,piece) {
  const x=c*CELL+CELL/2, y=r*CELL+CELL/2, rad=CELL/2-6;
  ctx.beginPath(); ctx.arc(x+1.5,y+3,rad,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,.38)'; ctx.fill();
  const red=isP(piece);
  const g=ctx.createRadialGradient(x-rad*.28,y-rad*.3,rad*.06,x,y,rad);
  if (red){g.addColorStop(0,'#ff6b6b');g.addColorStop(1,'#b71c1c');}
  else    {g.addColorStop(0,'#546e7a');g.addColorStop(1,'#102027');}
  ctx.beginPath(); ctx.arc(x,y,rad,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
  ctx.beginPath(); ctx.arc(x,y,rad,0,Math.PI*2);
  ctx.strokeStyle=red?'#7f0000':'#000a12'; ctx.lineWidth=2; ctx.stroke();
  ctx.beginPath(); ctx.arc(x,y,rad-5,0,Math.PI*2);
  ctx.strokeStyle=red?'rgba(255,160,160,.22)':'rgba(255,255,255,.07)';
  ctx.lineWidth=1.5; ctx.stroke();
  if (isKing(piece)) {
    ctx.font=`bold ${Math.round(CELL*.36)}px serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.shadowColor='rgba(0,0,0,.8)'; ctx.shadowBlur=4;
    ctx.fillStyle='#ffd700'; ctx.fillText('♛',x,y+1); ctx.shadowBlur=0;
  }
}

document.getElementById('newBtn').addEventListener('click', newGame);
newGame();
</script>
